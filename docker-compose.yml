version: "3.9"

# Yojimbo — Government AI Receptionist
# Production docker-compose for single-server deployment
#
# Usage:
#   cp .env.example .env && vi .env    # fill in real secrets
#   docker compose up -d               # start all services
#   docker compose logs -f app         # watch app logs
#   docker compose exec app alembic upgrade head  # run migrations manually

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - ENVIRONMENT=production
    volumes:
      - yojimbo_db:/app/data          # persistent SQLite data volume
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    expose:
      - "8000"
    networks:
      - yojimbo_net

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro        # mount TLS certs (Let's Encrypt / manual)
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - yojimbo_net

volumes:
  yojimbo_db:
    driver: local

networks:
  yojimbo_net:
    driver: bridge
