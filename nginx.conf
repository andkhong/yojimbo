# Nginx reverse proxy config for Yojimbo — government AI receptionist
# Place at /etc/nginx/conf.d/default.conf inside the nginx container
#
# Features:
#   - WebSocket upgrade for /ws/* endpoints (ConversationRelay + dashboard + monitor)
#   - Gzip compression for API JSON responses
#   - Security headers (CSP, X-Frame-Options, HSTS)
#   - 30s proxy timeout for long-lived WebSocket connections
#   - Rate limiting zones (Twilio webhooks, auth, general API)
#   - Health check passthrough without rate limiting

# ---------------------------------------------------------------------------
# Rate limiting zones (defined in http block — set in nginx.conf main file
# when deploying standalone; these are commented here for reference)
#
# limit_req_zone $binary_remote_addr zone=twilio:10m rate=60r/m;
# limit_req_zone $binary_remote_addr zone=auth:10m   rate=10r/m;
# limit_req_zone $binary_remote_addr zone=api:10m    rate=300r/m;
# ---------------------------------------------------------------------------

upstream yojimbo_app {
    server app:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Redirect all HTTP to HTTPS in production
    # (comment out if using HTTP-only for local dev)
    # return 301 https://$host$request_uri;

    # ---- Security headers ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ---- Gzip ----
    gzip on;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/xml;
    gzip_min_length 1024;
    gzip_comp_level 5;

    # ---- Client limits ----
    client_max_body_size 10M;
    client_body_timeout 30s;
    client_header_timeout 30s;

    # ---- Health check (no rate limit) ----
    location = /api/health {
        proxy_pass http://yojimbo_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # ---- Twilio webhooks (strict rate limit) ----
    location /api/twilio/ {
        # limit_req zone=twilio burst=10 nodelay;
        proxy_pass http://yojimbo_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ---- Auth endpoints (strict rate limit) ----
    location /api/auth/ {
        # limit_req zone=auth burst=5 nodelay;
        proxy_pass http://yojimbo_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- WebSocket endpoints (/ws/*) ----
    location /ws/ {
        proxy_pass http://yojimbo_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;   # 1-hour WebSocket timeout
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;
    }

    # ---- General API ----
    location /api/ {
        # limit_req zone=api burst=50 nodelay;
        proxy_pass http://yojimbo_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ---- Static assets + SPA fallback ----
    location /static/ {
        proxy_pass http://yojimbo_app;
        proxy_set_header Host $host;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        proxy_pass http://yojimbo_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

