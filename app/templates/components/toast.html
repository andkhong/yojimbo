<div x-show="toasts.length > 0"
     class="fixed bottom-4 right-4 z-50 space-y-2"
     x-cloak>
    <template x-for="toast in toasts" :key="toast.id">
        <div x-show="toast.visible"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-y-2"
             x-transition:enter-end="opacity-100 translate-y-0"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 translate-y-0"
             x-transition:leave-end="opacity-0 translate-y-2"
             class="rounded-lg p-4 shadow-lg max-w-sm"
             :class="{
                 'bg-green-50 text-green-800 border border-green-200': toast.type === 'success',
                 'bg-blue-50 text-blue-800 border border-blue-200': toast.type === 'info',
                 'bg-yellow-50 text-yellow-800 border border-yellow-200': toast.type === 'warning',
                 'bg-red-50 text-red-800 border border-red-200': toast.type === 'error',
             }">
            <div class="flex items-start">
                <div class="flex-1">
                    <p class="text-sm font-medium" x-text="toast.title"></p>
                    <p class="mt-1 text-sm opacity-80" x-text="toast.message" x-show="toast.message"></p>
                </div>
                <button @click="removeToast(toast.id)" class="ml-3 opacity-60 hover:opacity-100">
                    <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                    </svg>
                </button>
            </div>
        </div>
    </template>
</div>
